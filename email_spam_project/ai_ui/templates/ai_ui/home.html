<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tools</title>
  <style>
    :root {
      --bg: #0b1220;
      --panel: #101a2e;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --border: rgba(255,255,255,0.10);
      --btn: #2563eb;
      --btn-hover: #1d4ed8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: radial-gradient(1200px 800px at 10% 10%, rgba(37,99,235,0.25), transparent 60%),
                  radial-gradient(900px 700px at 90% 20%, rgba(34,197,94,0.18), transparent 55%),
                  var(--bg);
      color: var(--text);
    }
    .container {
      max-width: 760px;
      margin: 0 auto;
      padding: 28px 16px 56px;
    }
    .panel {
      background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px;
    }
    h1 { margin: 0; font-size: 26px; font-weight: 800; }
    .sub { margin-top: 6px; color: var(--muted); font-size: 13px; line-height: 1.5; }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      margin-top: 14px;
    }
    @media (min-width: 700px) {
      .grid { grid-template-columns: 1fr 1fr 1fr; }
    }

    a.btn {
      display: block;
      text-decoration: none;
      background: var(--btn);
      color: white;
      padding: 12px 14px;
      border-radius: 12px;
      font-weight: 800;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.12);
    }
    a.btn:hover { background: var(--btn-hover); }
  </style>
</head>
<body>
  <div class="container">
    <div class="panel">
      <h1>Choose a tool</h1>
      <div class="sub">Open one page: Spam Check, AI Summary, or AI Response.</div>

      <div class="grid">
        <a class="btn" href="/spam/">Spam Check</a>
        <a class="btn" href="/summary/">Summary</a>
        <a class="btn" href="/ai-response/">AI Response</a>
      </div>
    </div>
  </div>
</body>
</html>
